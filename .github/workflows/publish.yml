name: Publish to npm

# Triggered by pushing a version tag (e.g. v0.2.0), typically via `make release VERSION=0.2.0`.
# Publishing uses npm Trusted Publishing (OIDC) + provenance — no npm tokens are stored.
# One-time setup: configure the trusted publisher for @aiand/sdk at
# https://www.npmjs.com/package/@aiand/sdk/access (link this repo + publish.yml).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (type-check)
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"; exit 1
          fi
          echo "Tag and package version agree: $PKG"

      # Recent npm CLI is required for OIDC Trusted Publishing.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish (provenance via OIDC)
        run: npm publish --provenance --access public
